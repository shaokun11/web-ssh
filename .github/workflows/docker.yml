name: Docker Build and Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: GITHUB_TOKEN

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "IMAGE_NAME=shaokun11/web-ssh" >> $GITHUB_ENV
          echo "APP_VERSION=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/shaokun11/web-ssh:${{ env.SHA_SHORT }}
            ghcr.io/shaokun11/web-ssh:${{ env.APP_VERSION }}
            ghcr.io/shaokun11/web-ssh:latest
          build-args: |
            --build-arg APP_VERSION=${{ env.APP_VERSION }}
            --build-arg BUILD_TIME=${{ env.BUILD_TIME }}
